name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 numpy

    - name: Build C++ extension
      run: python setup.py build_ext --inplace

    - name: Smoke-test the compiled core
      run: |
        python - <<'EOF'
        import glob, importlib.util, numpy as np
        so = sorted(glob.glob("feather_db/core*.so"))[0]
        spec = importlib.util.spec_from_file_location("core", so)
        core = importlib.util.module_from_spec(spec); spec.loader.exec_module(core)
        db = core.DB.open("smoke.feather", dim=8)
        db.add(id=1, vec=np.random.rand(8).astype(np.float32))
        r = db.search(np.random.rand(8).astype(np.float32), k=1)
        assert r[0].id == 1, r
        print("✓ core import + add + search OK")
        import os; os.remove("smoke.feather")
        EOF

    - name: Run feature test suite
      run: |
        set -e
        for t in test_secondary_index test_prefiltered_search test_auto_compact test_quantization; do
          echo "::group::$t"
          python "$t.py"
          echo "::endgroup::"
        done
