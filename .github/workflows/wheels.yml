name: Build & Publish Wheels

# Builds manylinux + macOS binary wheels (and the sdist) with cibuildwheel so
# `pip install feather-db` needs NO C++ compiler. Replaces the old
# publish-pypi.yml, which produced non-manylinux Linux wheels that PyPI rejects.
#
# Wheels are built with FEATHER_SIMD=sse: SSE2 is universal on x86-64, so the
# wheels run on any machine. (Local source builds still default to AVX.)

on:
  release:
    types: [published]
  workflow_dispatch:   # build wheels on demand without a release

jobs:
  build_wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu → manylinux x86_64; macos-13 → x86_64; macos-14 → arm64
        os: [ubuntu-latest, macos-13, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *_i686 *-win32"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ENVIRONMENT: "FEATHER_SIMD=sse"
          CIBW_TEST_REQUIRES: "numpy"
          CIBW_TEST_COMMAND: >-
            python -c "import feather_db, numpy as np;
            import feather_db.extractors, feather_db.reason, feather_db.integrations;
            db=feather_db.DB.open('t.feather', dim=8);
            db.add(id=1, vec=np.ones(8, dtype=np.float32));
            assert db.search(np.ones(8, dtype=np.float32), k=1)[0].id == 1;
            print('wheel OK', feather_db.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
