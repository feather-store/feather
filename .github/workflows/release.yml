name: Release

# On a version tag: build the Rust CLI binaries for Linux/macOS and publish a
# GitHub Release with them attached + notes from CHANGELOG.md. The PyPI wheels
# (wheels.yml) and crate (publish-rust.yml) publish off the SAME tag push, so
# all three run independently — no cross-workflow trigger needed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release + upload assets

jobs:
  build-cli:
    name: CLI ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: feather-cli-linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: feather-cli-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: feather-cli-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI (vendored C++ via build.rs)
        working-directory: feather-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp "feather-cli/target/${{ matrix.target }}/release/feather" "${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for the full changelog.

            ## Install
            ```bash
            pip install feather-db          # Python
            cargo install feather-db-cli    # Rust CLI
            ```
